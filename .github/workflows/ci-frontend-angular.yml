name: CI — Frontend (Angular)

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend-angular.yml'
  pull_request:
    paths: ['frontend/**']

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-image:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: false
      matrix:
        app:
          - { name: angular-dashboard,    path: frontend/angular-dashboard }
          - { name: admin-panel,          path: frontend/admin-panel }
          - { name: realtime-monitor,     path: frontend/realtime-monitor }
          - { name: analytics-dashboard,  path: frontend/analytics-dashboard }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: '${{ matrix.app.path }}/package-lock.json' }
      - name: Install
        working-directory: ${{ matrix.app.path }}
        run: npm ci || npm install
      - name: Build
        working-directory: ${{ matrix.app.path }}
        run: npm run build -- --configuration production || npm run build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app.path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.app.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.app.name }}:latest
