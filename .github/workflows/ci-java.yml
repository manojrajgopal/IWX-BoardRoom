name: CI — Java Security Engine

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/security/java-security-engine/**'
      - '.github/workflows/ci-java.yml'
  pull_request:
    paths: ['backend/security/java-security-engine/**']

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/java-security-engine

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven }
      - name: Maven verify
        working-directory: backend/security/java-security-engine
        run: mvn -B -ntp verify
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: backend/security/java-security-engine
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
