      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Sql: "Server=sqlserver,1433;Database=IwxHr;User Id=sa;Password=IwxStrong!Passw0rd;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: rabbitmq
      RabbitMq__User: iwx
      RabbitMq__Pass: iwx
    ports: ["8082:8082"]
    depends_on:
      sqlserver: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    networks: [iwx-net]

