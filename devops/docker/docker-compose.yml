name: iwx-boardroom

networks:
  iwx-net:
    driver: bridge

volumes:
  sql-data:
  mongo-data:
  redis-data:
  rabbit-data:
  kafka-data:
  ollama-data:
  chroma-data:

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: iwx-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "IwxStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports: ["1433:1433"]
    volumes: ["sql-data:/var/opt/mssql"]
    networks: [iwx-net]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      retries: 10

  mongo:
    image: mongo:7
    container_name: iwx-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: iwx
      MONGO_INITDB_ROOT_PASSWORD: iwx
    ports: ["27017:27017"]
    volumes: ["mongo-data:/data/db"]
    networks: [iwx-net]

  redis:
    image: redis:7-alpine
    container_name: iwx-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    networks: [iwx-net]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: iwx-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: iwx
      RABBITMQ_DEFAULT_PASS: iwx
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes: ["rabbit-data:/var/lib/rabbitmq"]
    networks: [iwx-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: iwx-kafka
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports: ["9092:9092"]
    volumes: ["kafka-data:/bitnami/kafka"]
    networks: [iwx-net]

  ollama:
    image: ollama/ollama:latest
    container_name: iwx-ollama
    ports: ["11434:11434"]
    volumes: ["ollama-data:/root/.ollama"]
    networks: [iwx-net]

  ceo-agent-service:
    build:
      context: ../..
      dockerfile: backend/services/ceo-agent-service/IWX.CeoAgent.Api/Dockerfile
    container_name: iwx-ceo-agent
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Sql: "Server=sqlserver,1433;Database=IwxCeo;User Id=sa;Password=IwxStrong!Passw0rd;TrustServerCertificate=True;Encrypt=False"
      RabbitMq__Host: rabbitmq
      RabbitMq__User: iwx
      RabbitMq__Pass: iwx
    ports: ["8081:8081"]
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [iwx-net]

  orchestrator-ai:
    build:
      context: ../..
      dockerfile: backend/ai-services/orchestrator-ai/Dockerfile
    container_name: iwx-orchestrator
    environment:
      IWX_RABBITMQ_HOST: rabbitmq
      IWX_RABBITMQ_USER: iwx
      IWX_RABBITMQ_PASS: iwx
      IWX_OLLAMA_HOST: http://ollama:11434
      IWX_OLLAMA_MODEL: llama3.2:3b
    ports: ["8000:8000"]
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks: [iwx-net]

  api-gateway:
    build:
      context: ../..
      dockerfile: backend/api-gateway/IWX.ApiGateway/Dockerfile
    container_name: iwx-api-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    ports: ["8080:8080"]
    depends_on:
      - ceo-agent-service
      - orchestrator-ai
      - hr-agent-service
      - sales-agent-service
      - finance-agent-service
      - marketing-agent-service
      - operations-agent-service
      - development-agent-service
      - research-agent-service
      - legal-agent-service
      - social-media-agent-service
      - analytics-agent-service
      - customer-support-agent-service
      - automation-agent-service
      - platform-intelligence-agent-service
    networks: [iwx-net]

