# Standalone Traefik IngressRoute + mTLS for the API Gateway.
# Use this file if you are NOT deploying via the iwx-platform Helm chart.
---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata: { name: iwx-mtls-tlsoptions, namespace: iwx }
spec:
  minVersion: VersionTLS13
  clientAuth:
    secretNames: [iwx-client-ca]
    clientAuthType: RequireAndVerifyClientCert
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: iwx-pass-client-cert, namespace: iwx }
spec:
  passTLSClientCert:
    pem: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata: { name: iwx-rate-limit, namespace: iwx }
spec:
  rateLimit:
    average: 100
    burst: 200
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata: { name: iwx-gateway, namespace: iwx }
spec:
  entryPoints: [websecure]
  routes:
    - match: Host(`iwx.example.com`)
      kind: Rule
      services:
        - { name: api-gateway, port: 8080 }
      middlewares:
        - { name: iwx-pass-client-cert }
        - { name: iwx-rate-limit }
  tls:
    secretName: iwx-tls
    options: { name: iwx-mtls-tlsoptions }
