# Edge NGINX configuration (alternative to Traefik IngressRoute).
# Routes requests to the api-gateway and enforces mTLS at the edge.
#
# Mount paths inside the container:
#   /etc/nginx/ssl/server.crt   /etc/nginx/ssl/server.key
#   /etc/nginx/ssl/ca.crt       (the IWX client CA bundle)

worker_processes auto;
events { worker_connections 4096; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    upstream iwx_gateway {
        server api-gateway.iwx.svc.cluster.local:8080;
        keepalive 64;
    }

    # Plaintext -> HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS with mTLS
    server {
        listen 443 ssl http2;
        server_name iwx.example.com;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # mTLS — require client cert signed by the IWX private CA
        ssl_client_certificate /etc/nginx/ssl/ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        # Pass client cert info to the gateway
        proxy_set_header X-Client-Cert      $ssl_client_escaped_cert;
        proxy_set_header X-Client-DN        $ssl_client_s_dn;
        proxy_set_header X-Client-Verify    $ssl_client_verify;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        location / {
            proxy_pass http://iwx_gateway;
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }

        # SignalR / WebSockets
        location /hubs/ {
            proxy_pass http://iwx_gateway;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600;
        }
    }
}
